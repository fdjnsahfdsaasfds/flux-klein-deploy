build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "ffmpeg"
  python_version: "3.11"
  python_packages:
    - "torch==2.4.0"
    - "torchvision"
    - "transformers"
    - "accelerate"
    - "sentencepiece"
    - "hf-transfer"
    - "huggingface-hub"
    - "requests"
    - "peft"
    - "protobuf"
  run:
    - "pip install git+https://github.com/huggingface/diffusers.git"
predict: "predict.py:Predictor"
